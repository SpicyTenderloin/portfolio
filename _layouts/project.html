---
layout: default
---
<div class="project-detail">
  <a class="back-link" href="{{ "/projects/" | relative_url }}">&larr; Back to all projects</a>
  <h1>{{ page.title }}</h1>

  {% if page.gallery %}
  <div class="gallery">
    {% for img in page.gallery %}
    <img src="{{ img | relative_url }}" alt="{{ page.title }}">
    {% endfor %}
  </div>
  {% endif %}

  {{ content }}
</div>
